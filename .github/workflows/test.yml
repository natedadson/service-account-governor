name: Test Service Account Governor

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run syntax check
      run: |
        python -m py_compile src/discovery/find_service_roles.py
        python -m py_compile src/risk_scoring/privilege_score.py
        python -m py_compile src/risk_scoring/activity_score.py
        python -m py_compile src/combined_scorer.py
    
    - name: Run import tests
      run: |
        # Add src to Python path
        export PYTHONPATH="${PYTHONPATH}:./src"
        
        # Test imports
        python -c "import sys; sys.path.insert(0, 'src'); from discovery.find_service_roles import ServiceRoleDiscovery; print('✅ Discovery module OK')"
        python -c "import sys; sys.path.insert(0, 'src'); from risk_scoring.privilege_score import PrivilegeScorer; print('✅ Privilege module OK')"
        python -c "import sys; sys.path.insert(0, 'src'); from risk_scoring.activity_score import ActivityScorer; print('✅ Activity module OK')"
    
    - name: Run unit tests
      run: |
        echo "Unit tests will be added in Phase 2"
        # Add actual unit tests here later
    
    - name: Validate CSV output structure
      run: |
        # Just validate the code runs without AWS credentials
        python -c "import sys; sys.path.insert(0, 'src'); from discovery.find_service_roles import ServiceRoleDiscovery; print('Code syntax is valid')"
